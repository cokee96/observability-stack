## Grafana Tempo datasource ConfigMap
## The Grafana sidecar (kiwigrid/k8s-sidecar) picks up any ConfigMap
## with label grafana_datasource: "1" in the monitored namespaces.
##
## Deploy this into the same namespace where Grafana is running (typically 'monitoring').
## kubectl apply -f grafana/datasources/tempo.yaml -n monitoring

apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-datasource
  namespace: monitoring
  labels:
    grafana_datasource: "1"
    app.kubernetes.io/part-of: distributed-tracing
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Tempo
        type: tempo
        uid: tempo
        access: proxy
        url: http://tempo.tracing.svc.cluster.local:3100
        isDefault: false
        version: 1
        editable: false
        jsonData:
          # Correlate traces → logs in Loki
          tracesToLogs:
            datasourceUid: loki
            tags:
              - key: service.name
                value: job
              - key: k8s.namespace.name
                value: namespace
            mapTagNamesEnabled: true
            filterByTraceID: true
            filterBySpanID: false
            spanStartTimeShift: "-1h"
            spanEndTimeShift: "1h"
            lokiSearch: true

          # Correlate traces → metrics in Prometheus (via span metrics)
          tracesToMetrics:
            datasourceUid: prometheus
            spanStartTimeShift: "-2m"
            spanEndTimeShift: "2m"
            tags:
              - key: service.name
                value: service
            queries:
              - name: Request rate
                query: >-
                  sum(rate(traces_spanmetrics_calls_total{$$__tags}[5m]))
              - name: P99 latency
                query: >-
                  histogram_quantile(0.99,
                    sum(rate(traces_spanmetrics_duration_milliseconds_bucket{$$__tags}[5m]))
                    by (le)
                  )

          # Service graph via Prometheus span metrics
          serviceMap:
            datasourceUid: prometheus

          # Node graph visualization
          nodeGraph:
            enabled: true

          # Search configuration
          search:
            hide: false
            maxDuration: "0"

          # Tempo version for API compatibility
          lokiSearch:
            datasourceUid: loki
