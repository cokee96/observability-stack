# pre — medium resources, 7d retention, single replica
prometheus:
  prometheusSpec:
    retention: 7d
    replicas: 1
    storageSpec:
      volumeClaimTemplate:
        spec:
          resources:
            requests:
              storage: 10Gi
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi

alertmanager:
  alertmanagerSpec:
    replicas: 1

grafana:
  replicas: 1
