# dev — minimal resources, short retention, single replica
prometheus:
  prometheusSpec:
    retention: 3d
    replicas: 1
    storageSpec:
      volumeClaimTemplate:
        spec:
          resources:
            requests:
              storage: 5Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi

alertmanager:
  alertmanagerSpec:
    replicas: 1

grafana:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
