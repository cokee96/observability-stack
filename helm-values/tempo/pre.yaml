## Grafana Tempo — pre-production environment overrides
## Mode: single binary, local filesystem, 7-day retention

tempo:
  # Retention: 7 days
  retention: 168h

  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces
      wal:
        path: /var/tempo/wal

  ingester:
    trace_idle_period: 30s
    max_block_bytes: 5_000_000
    max_block_duration: 30m
    lifecycler:
      ring:
        replication_factor: 1

  server:
    log_level: info

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

persistence:
  enabled: true
  size: 20Gi
