apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.io
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: observability

  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: "65.1.1"

    helm:
      releaseName: kube-prometheus-stack

      # Base values shared across all environments, then the per-environment
      # overlay is selected via the $ARGOCD_ENV_environment variable that
      # ArgoCD injects from the argocd-cm ConfigMap key "environment".
      valueFiles:
        - $values/helm-values/kube-prometheus-stack/base.yaml
        - $values/helm-values/kube-prometheus-stack/$ARGOCD_ENV_environment.yaml

      parameters:
        - name: global.env
          value: $ARGOCD_ENV_environment

  # The valueFiles above reference paths in the Git repo, so we need a second
  # source pointing to the repo that holds the values files.
  sources: []

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  ignoreDifferences:
    # kube-prometheus-stack mutates these fields at runtime
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      jsonPointers:
        - /webhooks/0/clientConfig/caBundle
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      jsonPointers:
        - /webhooks/0/clientConfig/caBundle
