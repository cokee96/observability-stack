apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-upgrades
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.io
  annotations:
    # Deploy ArgoCD itself before the observability apps so the project CRD
    # and RBAC resources are in place first.
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: observability

  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-cd
    targetRevision: "7.6.12"

    helm:
      releaseName: argocd

      values: |
        global:
          image:
            tag: v2.12.0

        # ── Server ────────────────────────────────────────────────────────────
        server:
          # --insecure: TLS termination is handled by an Ingress / load-balancer
          # in front of the pod; the pod itself serves plain HTTP.
          extraArgs:
            - --insecure

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

        # ── Application Controller ────────────────────────────────────────────
        controller:
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi

        # ── Repo Server ───────────────────────────────────────────────────────
        repoServer:
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

        # ── Redis ─────────────────────────────────────────────────────────────
        redis:
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi

        # ── ApplicationSet Controller ─────────────────────────────────────────
        applicationSet:
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi

        # ── Notifications Controller ──────────────────────────────────────────
        notifications:
          enabled: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi

        # ── RBAC ──────────────────────────────────────────────────────────────
        configs:
          rbac:
            policy.default: role:readonly
            policy.csv: |
              p, role:org-admin, applications, *, */*, allow
              p, role:org-admin, clusters, get, *, allow
              p, role:org-admin, repositories, *, *, allow
              p, role:org-admin, projects, *, *, allow
              g, argocd-admins, role:org-admin

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m

  ignoreDifferences:
    - group: ""
      kind: Secret
      name: argocd-secret
      jsonPointers:
        - /data
