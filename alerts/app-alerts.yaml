apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: app-alerts
  namespace: monitoring
  labels:
    app: kube-prometheus-stack
    release: kube-prometheus-stack
spec:
  groups:
    - name: app.golden-signals
      interval: 1m
      rules:
        # High error rate
        - alert: HighErrorRate
          expr: |
            sum(rate(http_requests_total{status=~"5.."}[5m])) by (service, namespace)
            /
            sum(rate(http_requests_total[5m])) by (service, namespace)
            > 0.05
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "High error rate on {{ $labels.service }}"
            description: "Error rate is {{ $value | printf \"%.2f\" }}% (threshold: 5%) on service {{ $labels.service }} in {{ $labels.namespace }}."

        # High latency P99
        - alert: HighLatencyP99
          expr: |
            histogram_quantile(0.99,
              sum(rate(http_request_duration_seconds_bucket[5m])) by (le, service, namespace)
            ) > 2
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High P99 latency on {{ $labels.service }}"
            description: "P99 latency is {{ $value | printf \"%.2f\" }}s (threshold: 2s) on service {{ $labels.service }}."

        # Service down (no requests)
        - alert: ServiceDown
          expr: |
            sum(rate(http_requests_total[5m])) by (service, namespace) == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Service {{ $labels.service }} is not receiving requests"
            description: "No HTTP traffic detected on service {{ $labels.service }} in {{ $labels.namespace }} for 5 minutes."

        # PVC almost full
        - alert: PersistentVolumeAlmostFull
          expr: |
            (kubelet_volume_stats_available_bytes / kubelet_volume_stats_capacity_bytes) * 100 < 10
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} < 10% free"
            description: "Only {{ $value | printf \"%.1f\" }}% of PVC capacity remains."
